
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:0 0 40px;font-family:'Inter',sans-serif;}
.hero{background:#0a0a0a;border-radius:20px;padding:52px 48px;display:flex;align-items:center;gap:22px;margin-bottom:12px;}
.hero-light{background:#f7f7f5;border-radius:20px;padding:52px 48px;display:flex;align-items:center;gap:22px;margin-bottom:28px;border:1px solid rgba(0,0,0,.07);}
.wm{font-size:40px;font-weight:800;letter-spacing:-.04em;line-height:1;}
.lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:14px;margin-top:24px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.vcard{border-radius:16px;padding:28px 12px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.vc-name{font-size:15px;font-weight:800;letter-spacing:-.03em;}
.vc-tag{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.4;}
.sz-row{display:flex;align-items:center;gap:18px;background:#0a0a0a;border-radius:14px;padding:20px 24px;margin-top:12px;flex-wrap:wrap;}
.sz-lbl{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;font-weight:500;}

<div class="wrap">

<!-- The mark: three staggered chevron-slash lines forming a dynamic "forward motion / stack" shape -->
<!-- Pure abstract: angled parallel cuts suggesting speed, layers, and precision -->

<div class="hero">
  <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <polygon points="8,42 22,12 30,12 16,42" fill="#fff"/>
